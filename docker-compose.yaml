

services:

  nginx:
    build:
      context: ./nginx
    # монтируем директорию nginx и сертификат с ключом
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/live/fff.engbot.ru/fullchain.pem:/etc/nginx/cert.pem:ro
      - /etc/letsencrypt/live/fff.engbot.ru/privkey.pem:/etc/nginx/key.pem:ro
      # Also mount the entire letsencrypt directory for renewal
      - /etc/letsencrypt:/etc/letsencrypt:ro

    ports:
      - "443:443"
    depends_on:
      - bot  
    restart: always  

  bot:
    build:
      context: ./
    restart: always 
    environment:
      - DEBUG=pw:browser
    # 2. Увеличиваем объем общей памяти (решает проблему белого экрана)
    shm_size: '2gb' 
    #ports:
      #- "80:80"  
    
         

  






























